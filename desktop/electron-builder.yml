appId: com.coffemaya.pos
productName: Coffe Maya POS
copyright: Copyright © 2026 Robbienicur

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

asar: true

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: Coffe-Maya-Setup-${version}.exe

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: Coffe Maya POS
  createDesktopShortcut: true
  createStartMenuShortcut: true
